music_directory    "~/Music"
playlist_directory "~/Music/playlists"
db_file            "~/.mpd/tag_cache"
log_file           "~/.mpd/mpd.log"
pid_file           "~/.mpd/pid"
state_file         "~/.mpd/state"
sticker_file       "~/.mpd/sticker.sql"

audio_output {
    type            "pulse"
    name            "PulseAudio Output"
    mixer_type      "software"
}

audio_output {
   type   "fifo"
   name   "my_fifo"
   path   "/tmp/mpd.fifo"
   format "44100:16:2"
}

