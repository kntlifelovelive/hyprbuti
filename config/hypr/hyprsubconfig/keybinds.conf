# ┌───────────────────────────────────────────────────────────────────────────┐
# │                                 KEYBINDINGS                               │
# └───────────────────────────────────────────────────────────────────────────┘



# ┌────────────────────────────────────────────┐
# │  Snappy-switcher Keybindings               │
# └────────────────────────────────────────────┘
bind = ALT, Tab, exec, /usr/bin/snappy-switcher next
bind = ALT SHIFT, Tab, exec, /usr/bin/snappy-switcher prev


# ┌────────────────────────────────────────────┐
# │       Kitty Themes Switch Keybinds         │
# └────────────────────────────────────────────┘
bind = $mainMod ALT, K, exec, ~/testbashscript/kitty-theme-switch.sh

# ┌────────────────────────────────────────────┐
# │     HyprBorder Themes Switch Keybinds      │
# └────────────────────────────────────────────┘
bind = $mainMod ALT, B, exec, ~/.config/hypr/scripts/hyprbordertheme/hyprbordertheme-switch.sh


# ┌────────────────────────────────────────────┐
# │        RMPC Terminal Music Player          │
# └────────────────────────────────────────────┘
bind = $mainMod CTRL, M, exec, kitty -e rmpc



# ┌────────────────────────────────────────────┐
# │       GlobalVariables Source Link          │
# └────────────────────────────────────────────┘
source = ~/.config/hypr/hyprsubconfig/globalvaribles.conf



# ┌────────────────────────────────────────────┐
# │        Bluetooth Connect Script            │
# └────────────────────────────────────────────┘
bind = $mainMod CTRL, B, exec, ~/.config/hypr/scripts/bluetooth/bluetooth.sh


# ┌────────────────────────────────────────────┐
# │       Windows minimize Or  maximize        │
# └────────────────────────────────────────────┘
bind = $mainMod, M, fullscreen, 1


# ┌────────────────────────────────────────────┐
# │      My config            keybinds         │
# └────────────────────────────────────────────┘
bind = $mainMod, J, layoutmsg, togglesplit

# ┌────────────────────────────────────────────┐
# │      My Floating keybinds                  │
# └────────────────────────────────────────────┘
bind = $mainMod CTRL, F, togglefloating,

# ┌────────────────────────────────────────────┐
# │      App   Quick   keybinds                │
# └────────────────────────────────────────────┘
bind = $mainMod, Q, killactive,

# ┌────────────────────────────────────────────┐
# │            App fore kill  keybinds         │
# └────────────────────────────────────────────┘
bind = $mainMod SHIFT, Q, exec, hyprctl kill 

# ┌────────────────────────────────────────────┐
# │          My Waybar Reload keybinds         │
# └────────────────────────────────────────────┘
bind = $mainMod, R, exec, $reload_waybar 

# ┌────────────────────────────────────────────┐
# │      My fileManager  keybinds              │
# └────────────────────────────────────────────┘
bind = $mainMod, E, exec, $fileManager --new-window 

# ┌────────────────────────────────────────────┐
# │      My Terminal Open keybinds             │
# └────────────────────────────────────────────┘
bind = $mainMod, T, exec, $terminal  

# ┌────────────────────────────────────────────┐
# │       My Browser Firefoxj keybinds         │
# └────────────────────────────────────────────┘
bind = $mainMod, B, exec, $browser # firefox

# ┌────────────────────────────────────────────┐
# │             My Telegram  keybinds          │
# └────────────────────────────────────────────┘
bind = $mainMod CTRL, T, exec, Telegram 

# ┌────────────────────────────────────────────┐
# │      Rofi menu keybinds  / Simple          │
# └────────────────────────────────────────────┘
# bind = $mainMod, D, exec , wofi --show drun --show-icons       

# ┌────────────────────────────────────────────┐
# │      Applications Menu    keybinds         │
# └────────────────────────────────────────────┘
bind = $mainMod, D, exec, ~/.config/hypr/scripts/applauncher/appmenu.sh

# ┌────────────────────────────────────────────┐
# │               Power-menu keybinds          │
# └────────────────────────────────────────────┘
bind = $mainMod CTRL, P, exec, ~/.config/hypr/scripts/powermenu/rofipowermenu.sh

# ┌────────────────────────────────────────────┐
# │      KeyboardLayout Switch Keybindins      │
# └────────────────────────────────────────────┘
bind = SUPER, SPACE, exec, hyprctl switchxkblayout current next


# ┌────────────────────────────────────────────┐
# │  Waybar StyleCss Switch Script Keybinding  │
# └────────────────────────────────────────────┘
bind = $mainMod, W, exec, ~/.config/hypr/scripts/waybar/waybar-css-themes-switch.sh

# ┌────────────────────────────────────────────┐
# │  Waybar StyleCss Switch Script Keybinding  │
# └────────────────────────────────────────────┘
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/waybar/waybar-pair-switch.sh

# ┌────────────────────────────────────────────┐
# │  WallpaperSwitch Script Keybinding         │
# └────────────────────────────────────────────┘
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/wallpaper/wallpaperSwitch.sh 


# ┌────────────────────────────────────────────┐
# │    Foreground Image Select Keybindings     │
# └────────────────────────────────────────────┘
bind = $mainMod ALT, f, exec, ~/.config/hypr/scripts/hyprlock/hyprlockforeImage.sh

# ┌────────────────────────────────────────────┐
# │ Lock Background Wallpaper  Keybindings     │
# └────────────────────────────────────────────┘
bind = $mainMod SHIFT, l, exec, ~/.config/hypr/scripts/hyprlock/hyprlockWallpaper_bg.sh

# ┌────────────────────────────────────────────┐
# │               Windows Switch               │
# └────────────────────────────────────────────┘
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d



# ┌────────────────────────────────────────────┐
# │           Workspace Next Workspac          │ 
# └────────────────────────────────────────────┘
bind = $mainMod, Tab, workspace, e+1   
bind = $mainMod CTRL, Tab, workspace, e-1

# ┌────────────────────────────────────────────┐
# │           New Workspaces toggle            │
# └────────────────────────────────────────────┘
bind = $mainMod SHIFT, Tab, exec, hyprctl dispatch workspace +1


# ┌────────────────────────────────────────────┐
# │     Hyprland Keybindings Help Menu         │
# └────────────────────────────────────────────┘
bind = $mainMod ALT, H, exec, ~/.config/hypr/scripts/hyprmenu/hyprhelpmenu.sh


# ┌────────────────────────────────────────────┐
# │          Move active window                │
# └────────────────────────────────────────────┘
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


# ┌────────────────────────────────────────────┐
# │            Special workspace               │
# └────────────────────────────────────────────┘
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod, U, togglespecialworkspace,

# ┌────────────────────────────────────────────┐
# │    Special workspace (scratchpad)          │
# └────────────────────────────────────────────┘
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ┌────────────────────────────────────────────┐
# │   Scroll through existing workspaces       │
# └────────────────────────────────────────────┘
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ┌────────────────────────────────────────────┐
# │   Mouse Layout Scroll Keybinds             │
# └────────────────────────────────────────────┘
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ┌────────────────────────────────────────────┐
# │ Laptop multimedia keys LCD Birghtness      │
# └────────────────────────────────────────────┘
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ┌────────────────────────────────────────────┐
# │          Requires playerctl                │
# └────────────────────────────────────────────┘
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# ┌────────────────────────────────────────────┐
# │                                            │
# └────────────────────────────────────────────┘
# --NOTE:  PrintScreen = Select Area & Save to ~/Pictures
bind = , Print, exec, grimblast copysave area ~/Pictures/Screenshots/-$(date +%Y-%m-%d_%H-%M-%S).png

# ┌────────────────────────────────────────────┐
# │                                            │
# └────────────────────────────────────────────┘
# --NOTE:  Shift+PrintScreen = Fullscreen Screenshot & Save
bind = SHIFT, Print, exec, grimblast copysave screen ~/Pictures/Screenshots/-$(date +%Y-%m-%d_%H-%M-%S).png 

# ┌────────────────────────────────────────────┐
# │                                            │
# └────────────────────────────────────────────┘
# --NOTE:  Ctrl+PrintScreen = Select Area & Copy to Clipboard (no file saved)
bind = CTRL, Print, exec, grimblast copy area

# ┌────────────────────────────────────────────┐
# │                                            │
# └────────────────────────────────────────────┘
# --NOTE:  Alt+PrintScreen = Active Window Screenshot & Save
bind = ALT, Print, exec, grimblast copysave active ~/Pictures/Screenshots/-$(date +%Y-%m-%d_%H-%M-%S).png

